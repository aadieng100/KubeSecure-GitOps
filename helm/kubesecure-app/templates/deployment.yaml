apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: kubesecure-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kubesecure-api
  template:
    metadata:
      labels:
        app: kubesecure-api
    spec:
      # DevSecOps: Enforce non-root execution at the pod level
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # DevSecOps: Harden container security context
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # DevSecOps: Inject database credentials from safe environment variables
          env:
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: password
          # DevSecOps: Prevent resource exhaustion (OOMKilled protection)
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # DevSecOps: Add temporary writable space since root filesystem is read-only
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir: {}
